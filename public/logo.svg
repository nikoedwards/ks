<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Sonar arcs (concentric, fading) -->
  <circle cx="12" cy="28" r="22" stroke="#05CE78" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.18"/>
  <circle cx="12" cy="28" r="15" stroke="#05CE78" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.32"/>
  <circle cx="12" cy="28" r="8"  stroke="#05CE78" stroke-width="1.5" opacity="0.55"/>
  <!-- Scan line -->
  <line x1="12" y1="28" x2="36" y2="6" stroke="#05CE78" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Blip dot -->
  <circle cx="30" cy="10" r="2.5" fill="#05CE78"/>
  <!-- Origin dot -->
  <circle cx="12" cy="28" r="2" fill="#05CE78" opacity="0.8"/>
</svg>
